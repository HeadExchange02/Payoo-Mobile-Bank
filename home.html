<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo | Home</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">

    <!-- Tailwind + DaisyUI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- icons -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>

        *{
            font-family: "Outfit", sans-serif;
        }

    </style>

</head>

<body class="min-h-screen max-w-md bg-base-200 mx-auto">

    <!-- Balance -->
    <header class="border-b-2 border-gray-300 sticky top-0 bg-base-200">
        <section class="w-11/12 mx-auto py-3 flex justify-between items-center">

            <div class="left flex">

                <div class="logo w-[60px]">
                    <img src="assets/logo.png" alt="">
                </div>

                <div class="balence-info">

                    <h2 class="text-2xl font-bold">$ <span id="balance">20</span></h2>
                    <p class="text-neutral/50">Available Balance</p>

                </div>

            </div>

            <div class="right">

                <a href="/index.html">
                    <button class="btn btn-soft items-center"><span><i class="fa-solid fa-right-from-bracket"></i></span> Logout</button>
                </a>
                
            </div>

        </section>
    </header>

    <!-- Features -->
    <section class="w-11/12 mx-auto space-y-3">
        <h2 class="text-3xl font-bold py-10">Welcome to Pay<span class="text-primary">oo</span></h2>
        <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and resonable.</p>

        <div class="buttons grid grid-cols-3 gap-3">

            <button onclick="showOnly('add-money')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="assets/opt-1.png" alt="">
                <p>Add Money</p>
            </button>

            <button onclick="showOnly('cashout')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="assets/opt-2.png" alt="">
                <p>Cashout</p>
            </button>

            <button onclick="showOnly('')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="assets/opt-3.png" alt="">
                <p>Send Money</p>
            </button>

            <button onclick="showOnly('')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="assets/opt-4.png" alt="">
                <p>Get Bonous</p>
            </button>

            <button onclick="showOnly('')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="assets/opt-5.png" alt="">
                <p>Pay Bills</p>
            </button>

            <button onclick="showOnly('')" class="btn flex-col h-full py-4 btn-primary btn-soft">
                <img src="assets/opt-6.png" alt="">
                <p>Transactions</p>
            </button>

        </div>

    </section>

    <!-- Add Money Section -->
    <section id="add-money" class="w-11/12 mx-auto py-5">

        <h2 class="text-xl font-bold mt-5 mb-5">Add Money</h2>

        <!-- form card container -->
        <div class="card bg-base-100 w-full shadow-2xl rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">

                    <label class="label text-neutral font-bold">Select Bank</label>

                    <!-- add-money-bank -->
                    <select id="add-money-bank" class="select rounded-full bg-base-200 w-full">
                        <option disabled selected>Select a Bank</option>
                        <option value="UCB">UCB</option>
                        <option value="BRAC">BRAC</option>
                        <option value="CITY">CITY</option>
                        <option value="DBBL">DBBL</option>
                    </select>

                    <br>

                    <label class="label text-neutral font-bold">Bank Account Number</label>
                    <input id="add-money-number" maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200 w-full" value="01629376937" placeholder="Enter your bank 11 digit number" />

                    <br>

                    <label class="label text-neutral font-bold">Amount to add</label>
                    <input id="add-money-amount" type="number" class="input rounded-full bg-base-200 w-full" placeholder="Enter amount to add money" />

                    <br>

                    <label class="label text-neutral font-bold">4 Digit Pin</label>
                    <input id="add-money-pin" maxlength="4" minlength="4" type="password" class="input rounded-full bg-base-200 w-full" placeholder="4 digit pin" />

                    <div>
                        <a class="link link-hover">Forgot password?</a>
                    </div>

                    <button id="add-money-btn" class="btn btn-primary mt-4 rounded-full ">Add Money</button>

                </fieldset>
            </div>

        </div>
        
    </section>

    <!-- Cashout section -->
    <section id="cashout" class="w-11/12 mx-auto py-5 hidden">

        <h2 class="text-xl font-bold mt-5 mb-5">Cashout</h2>
        <!-- form card container -->
        <div class="card bg-base-100 w-full shadow-2xl rounded-2xl">
            <div class="card-body">
                <fieldset class="fieldset">

                    <label class="label text-neutral font-bold">Agent Number</label>
                    <input id="cashout-number" maxlength="11" minlength="11" type="text" class="input rounded-full bg-base-200 w-full" placeholder="Enter Agent 11 digit number" />

                    <br>

                    <label class="label text-neutral font-bold">Amount</label>
                    <input id="cashout-amount" type="number" class="input rounded-full bg-base-200 w-full" placeholder="Enter Amount" />

                    <br>

                    <label class="label text-neutral font-bold">4 Digit Pin</label>
                    <input id="cashout-pin" maxlength="4" minlength="4" type="password" class="input rounded-full bg-base-200 w-full" placeholder="4 digit pin" />

                    <div>
                        <a class="link link-hover">Forgot password?</a>
                    </div>

                    <button id="cashout-btn" class="btn btn-primary mt-4 rounded-full ">Withdraw Money</button>

                </fieldset>
            </div>

        </div>

    </section>



    <script src="Scripts/machine.js"></script>
    <script src="Scripts/addMoney.js"></script>
    <script src="Scripts/cashout.js"></script>

</body>
</html>
